apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: group-role-dev
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-role-dev
subjects:
- kind: Group
  name: dev
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: group-role-dev
  apiGroup: rbac.authorization.k8s.io